<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Bankruptcy</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Tab Bankruptcy</h1>
    <p class="description">Save all your tabs to bookmarks and start fresh</p>

    <img src="media/i-declare-bankruptcy.webp" alt="I declare bankruptcy!" class="bankruptcy-image">

    <div class="stats">
      <div class="stat-item">
        <span class="stat-label">Open Tabs:</span>
        <span class="stat-value" id="tabCount">...</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Windows:</span>
        <span class="stat-value" id="windowCount">...</span>
      </div>
    </div>

    <div class="profile-scope">
      <div class="profile-identity" id="profileIdentity">Running as: …</div>
      <p class="profile-warning">
        Only this Chrome profile is affected. Other profiles are not touched —
        run Tab Bankruptcy in each profile separately.
      </p>
    </div>

    <div class="options">
      <label class="checkbox-label">
        <input type="checkbox" id="closeTabs" checked>
        <span>Close tabs after saving</span>
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="currentWindowOnly">
        <span>Current window only</span>
      </label>
    </div>

    <button id="bankruptButton" class="bankruptcy-button">
      Declare Bankruptcy
    </button>

    <div id="status" class="status"></div>
  </div>

  <script src="profile-disclosure.js"></script>
  <script src="popup.js"></script>
</body>
</html>
